services:
  comlab:
    image: comlab:latest
    build: .
    ports:
      - "${PORT:-9999}:${PORT:-9999}"
    environment:
      PORT: "${PORT:-9999}"
      # Docker Desktop (macOS/Windows): host.docker.internal works out of the box.
      # Linux: add --add-host=host.docker.internal:host-gateway to the run command,
      #        or set OLLAMA_HOST to your machine's LAN IP, e.g. http://192.168.1.x:11434
      OLLAMA_HOST: "${OLLAMA_HOST:-http://host.docker.internal:11434}"
    volumes:
      # Persists progress across container restarts.
      # Create the file first so Docker doesn't mount it as a directory:
      #   touch progress.duckdb
      - ./progress.duckdb:/app/progress.duckdb
    restart: unless-stopped
